name: Build NIF Preview Plugin

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.mo2-version }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - mo2-version: "2.5.2"
            mo2-branch: "2_5_x"
            abi-include: "mo2-abi/2.5.2/include"
            zip-name: "NIF.Preview.MO2-2.5.2.zip"
          - mo2-version: "2.5.3beta11"
            mo2-branch: "2_5_x"
            abi-include: "mo2-abi/2.5.3beta11/include"
            zip-name: "NIF.Preview.MO2-2.5.3beta11.zip"

    steps:
      - name: Prepare mob workspace
        id: mob
        uses: ModOrganizer2/build-with-mob-action@master
        with:
          mo2-owner: ModOrganizer2
          mo2-branch: ${{ matrix.mo2-branch }}
          mo2-dependencies: ""
          mo2-skip-configure: "true"
          qt-install: "false"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.7.3
          arch: win64_msvc2019_64
          cache: true

      - name: Extract plugin version
        id: get_version
        shell: pwsh
        run: |
          $filePath = "./build/${{ github.event.repository.name }}/src/PreviewNif.cpp"

          if (-not (Test-Path -LiteralPath $filePath)) {
            Write-Error "File not found: $filePath"
            exit 1
          }

          $versionMatch = Select-String -Path $filePath -Pattern 'return\s*{\s*(\d+),\s*(\d+),\s*(\d+),'

          if ($versionMatch) {
            $major = $versionMatch.Matches[0].Groups[1].Value
            $minor = $versionMatch.Matches[0].Groups[2].Value
            $subminor = $versionMatch.Matches[0].Groups[3].Value
            $version = "$major.$minor.$subminor"

            Write-Output "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Error "Version information not found."
            exit 1
          }

      - name: Configure NIF Preview for MO2 ${{ matrix.mo2-version }}
        shell: pwsh
        run: |
          $repoPath = "./build/${{ github.event.repository.name }}"
          $abiInclude = Resolve-Path "$repoPath/${{ matrix.abi-include }}"

          Push-Location $repoPath
          cmake --preset vs2022-windows-standalone `
            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR" `
            "-DCMAKE_INSTALL_PREFIX=${{ steps.mob.outputs.cmake-install-path }}" `
            "-DMO2_UIBASE_INCLUDE_DIR:PATH=$abiInclude" `
            "-DPREVIEW_NIF_PACKAGE_MO2_VERSION:STRING=MO2-${{ matrix.mo2-version }}" `
            "-DBUILD_TESTING=ON"
          Pop-Location

      - name: Build release ZIP for MO2 ${{ matrix.mo2-version }}
        shell: pwsh
        run: |
          cmake --build --preset vs2022-windows-standalone --config RelWithDebInfo `
            --target preview_nif_zip --parallel 16
        working-directory: ./build/${{ github.event.repository.name }}

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-nif-${{ steps.get_version.outputs.version }}-mo2-${{ matrix.mo2-version }}
          path: ./build/${{ github.event.repository.name }}/dist/${{ matrix.zip-name }}
          if-no-files-found: error

  release:
    name: Publish GitHub release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Build release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $changelog = Get-Content -LiteralPath "CHANGELOG.md" -Raw
          $escapedTag = [regex]::Escape($tag)
          $match = [regex]::Match(
            $changelog,
            "(?ms)^##\s+$escapedTag\s+-[^\r\n]*\r?\n(?<body>.*?)(?=^##\s+|\z)"
          )

          if (-not $match.Success) {
            Write-Error "Could not find CHANGELOG.md section for $tag"
            exit 1
          }

          $notes = @("## Changelog", "", $match.Groups["body"].Value.Trim())
          $generated = gh api "repos/$repo/releases/generate-notes" `
            -f tag_name="$tag" | ConvertFrom-Json

          if ($generated.body) {
            $notes += ""
            $notes += "## GitHub Generated Notes"
            $notes += ""
            $notes += $generated.body.Trim()
          }

          Set-Content -LiteralPath "release-notes.md" `
            -Value ($notes -join "`n") `
            -Encoding utf8

      - name: Upload assets to GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $assets = @(
            "./dist/NIF.Preview.MO2-2.5.2.zip",
            "./dist/NIF.Preview.MO2-2.5.3beta11.zip"
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset)) {
              Write-Error "Missing release asset: $asset"
              exit 1
            }
          }

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --repo $repo --title $tag --notes-file release-notes.md
            gh release upload $tag $assets --repo $repo --clobber
          } else {
            gh release create $tag $assets --repo $repo --title $tag --notes-file release-notes.md
          }
