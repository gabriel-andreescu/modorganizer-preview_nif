changelog:
  exclude:
    labels:
      - ignore-for-release
      - no-changelog
    authors:
      - dependabot[bot]

  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - breaking

    - title: Features
      labels:
        - feature
        - enhancement

    - title: Fixes
      labels:
        - bug
        - fix

    - title: Build and Release
      labels:
        - build
        - ci
        - cd
        - release
        - automation

    - title: Documentation
      labels:
        - documentation
        - docs

    - title: Other Changes
      labels:
        - "*"
